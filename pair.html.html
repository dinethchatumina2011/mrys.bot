<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR_MINI_BOT - Pair</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            background-image: 
                radial-gradient(circle at 20% 50%, #ff006e 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, #8338ec 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, #3a86ff 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
       .container {
            background: rgba(20,20,20,0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255,0,110,0.3);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { 
            color: #ff006e; 
            text-align: center; 
            margin-bottom: 10px;
            font-size: 36px;
            text-shadow: 0 0 20px rgba(255,0,110,0.5);
        }
        .subtitle {
            text-align: center; 
            color: #aaa; 
            margin-bottom: 30px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,0,110,0.3);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            color: white;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ff006e;
            box-shadow: 0 0 20px rgba(255,0,110,0.3);
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { 
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,0,110,0.5);
        }
        #code {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #ff006e 0%, #8338ec 100%);
            border-radius: 10px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            display: none;
            letter-spacing: 8px;
            box-shadow: 0 0 30px rgba(255,0,110,0.5);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ CR_MINI_BOT</h1>
        <p class="subtitle">WhatsApp Pair System v2.0</p>
        <input type="text" id="number" placeholder="947xxxxxxxx" />
        <button onclick="getCode()">Generate Pair Code</button>
        <div id="code"></div>
        <p class="footer">Created by Rehan</p>
    </div>

    <script>
        async function getCode() {
            const number = document.getElementById('number').value
            if (!number) return alert('Number එක දාන්න!')

            const btn = document.querySelector('button')
            btn.innerText = 'Connecting...'
            btn.disabled = true

            const res = await fetch('/pair', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ number })
            })
            const data = await res.json()

            btn.innerText = 'Generate Pair Code'
            btn.disabled = false

            if (data.code) {
                document.getElementById('code').style.display = 'block'
                document.getElementById('code').innerText = data.code
            } else {
                alert(data.error || 'Error! Bot restart කරන්න')
            }
        }
    </script>
</body>
</html>
